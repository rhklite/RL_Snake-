model:
  arch: hybrid
  obs_type: hybrid
  hidden_size: 128
  num_layers: 4
  activation: relu

ppo:
  learning_rate: 2.5e-4
  gamma: 0.99
  gae_lambda: 0.95
  num_minibatches: 4
  update_epochs: 4
  clip_coef: 0.2
  ent_coef: 0.03
  vf_coef: 0.5
  max_grad_norm: 0.5

training:
  num_envs: 256
  num_steps: 128
  total_timesteps: 999_999_999 # effectively unlimited; plateau or time limit stops first
  seed: 1
  max_hours: 999.0
  plateau_steps: 1_000_000
  plateau_threshold: 0.1
  dist_shaping_alpha: 0.01  # doubled for 32x32 grid (same relative signal as 0.005 on 64x64)
  max_memory_pct: 95        # stop if system RAM usage exceeds this %

checkpointing:
  num_checkpoints: 5

experiments_dir: runs

video:
  num_videos: 5
  final_episodes: 3
  render_cell_size: 60
  fps: 30
